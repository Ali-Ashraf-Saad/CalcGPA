<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
        <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calc MyGPA</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { box-sizing: border-box; outline: none; }
        
        :root {
            --primary-color: #2196F3;
            --dark-blue: #1565C0;
            --danger-color: #ff4444;
            --warning-color: #FF8F00; /* للتقدير الجيد */
            --success-color: #00C851;
            
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
            --input-bg: #fff;
            --border-color: #ddd;
            --header-shadow: 0 2px 10px rgba(0,0,0,0.05);
            --modal-bg: rgba(0, 0, 0, 0.5);
            
            /* القيم الافتراضية للدائرة (ستتغير بالجافاسكريبت) */
            --dynamic-color: #00C851; 
            
            --circle-bg: #e6e6e6;
            --radius-input: 30px;
            --radius-card: 25px;
            --radius-btn: 50px;
        }

        body.dark-mode {
            --primary-color: #64b5f6;
            --dark-blue: #90caf9;
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --input-bg: #2c2c2c;
            --border-color: #444;
            --danger-color: #ff5252;
            --header-shadow: 0 2px 10px rgba(0,0,0,0.5);
            --modal-bg: rgba(0, 0, 0, 0.85);
            --circle-bg: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s, color 0.3s;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            background: var(--card-bg); padding: 25px 15px 15px 15px; 
            text-align: center; box-shadow: var(--header-shadow); margin-bottom: 30px;
            position: relative; transition: background-color 0.3s;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }
        h1 { margin: 0 0 8px 0; font-size: 2rem; color: var(--dark-blue); }
        .subtitle { font-size: 1rem; color: #888; margin-bottom: 15px; font-weight: 500; }
        .separator { width: 80px; height: 4px; background: linear-gradient(90deg, var(--primary-color), var(--success-color)); margin: 0 auto; border-radius: 2px; }

        .theme-toggle {
            position: absolute; top: 20px; left: 20px;
            background: transparent; border: none; font-size: 1.5rem;
            cursor: pointer; padding: 5px; width: auto; box-shadow: none;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 0 20px 100px 20px; }

        button {
            cursor: pointer; border: none; border-radius: var(--radius-btn);
            padding: 12px 20px; font-size: 16px; font-weight: 600;
            width: 100%; transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button:active { transform: scale(0.98); }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }

        .btn-add-term {
            background-color: transparent; color: var(--primary-color);
            border: 2px dashed var(--primary-color); margin-top: 15px;
        }
        .btn-add-term:hover { background-color: rgba(33, 150, 243, 0.1); }
        
        /* --- كرت الترم (Accordion Style) --- */
        .term-card {
            background-color: var(--card-bg); border-radius: var(--radius-card);
            padding: 0; /* التباعد يتم في العناصر الداخلية */
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border: 1px solid var(--border-color);
            overflow: hidden; /* مهم للطي */
            transition: all 0.3s ease;
            animation: slideDown 0.4s ease-out;
        }

        /* رأس الكرت (الجزء القابل للنقر) */
        .term-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; gap: 10px; cursor: pointer;
            background: rgba(0,0,0,0.02);
            border-bottom: 1px solid transparent; /* مخفي افتراضياً */
            transition: background 0.2s;
        }
        .term-header:hover { background: rgba(0,0,0,0.04); }
        
        /* عند فتح الكرت */
        .term-card.expanded .term-header {
            border-bottom: 1px solid var(--border-color);
        }

        /* سهم الطي */
        .arrow-icon {
            font-size: 1.2rem; color: #888; transition: transform 0.3s ease;
            margin-left: 10px;
        }
        .term-card.expanded .arrow-icon { transform: rotate(180deg); }

        .term-header input[type="text"] {
            font-size: 1.1rem; font-weight: bold; border: 1px solid var(--border-color);
            padding: 8px 15px; border-radius: var(--radius-input); flex: 1;
            color: var(--primary-color); background: var(--input-bg);
            cursor: text; /* ليعرف المستخدم أنه للكتابة */
        }
        
        /* جسم الكرت (المحتوى المخفي/الظاهر) */
        .term-body {
            max-height: 0; opacity: 0; overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            padding: 0 20px; /* التباعد الجانبي */
        }
        
        .term-card.expanded .term-body {
            max-height: 2000px; /* رقم كبير ليسمح بالتمدد */
            opacity: 1;
            padding-top: 20px; padding-bottom: 20px;
        }

        .btn-delete-term {
            width: 40px; padding: 0; height: 40px;
            background-color: rgba(255, 68, 68, 0.1); color: var(--danger-color);
            border: 1px solid var(--danger-color);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        
        .term-result-badge {
            background: var(--input-bg); color: var(--text-color); padding: 8px 15px; border-radius: var(--radius-btn);
            font-weight: bold; font-size: 0.9rem; display: none; margin-left: 5px;
            white-space: nowrap; border: 1px solid var(--border-color);
        }
        .term-result-badge.visible { display: block; color: var(--primary-color); }

        .radio-group { 
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; 
            background: rgba(0,0,0,0.03); padding: 15px; border-radius: 20px; 
        }
        .radio-title { font-size: 0.9rem; font-weight: bold; color: #888; margin-bottom: 5px; padding-right: 10px; }
        .radio-options-row { display: flex; gap: 10px; }
        
        .radio-option {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 12px 5px;
            border: 1px solid var(--border-color); border-radius: var(--radius-btn); cursor: pointer; transition: all 0.2s; 
            background: var(--input-bg); font-size: 0.9rem; text-align: center; color: var(--text-color);
        }
        .radio-option:has(input:checked) { border-color: var(--primary-color); background-color: rgba(33, 150, 243, 0.15); color: var(--primary-color); font-weight: bold;}
        .radio-option input { display: none; }

        .input-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        .hidden { display: none; }

        input, select {
            width: 100%; padding: 12px 20px;
            border: 1px solid var(--border-color); border-radius: var(--radius-input);
            font-size: 16px; background: var(--input-bg); color: var(--text-color);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .input-error {
            border-color: var(--danger-color) !important;
            background-color: var(--danger-bg) !important;
            box-shadow: 0 0 0 3px rgba(255, 68, 68, 0.1);
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        .error-feedback {
            color: var(--danger-color); font-size: 0.85rem; margin-top: 6px; padding: 0 15px;
            font-weight: 600; display: flex; align-items: center; opacity: 0; max-height: 0;
            overflow: hidden; transition: all 0.3s ease;
        }
        .error-feedback.visible { opacity: 1; max-height: 30px; transform: translateY(0); }

        .subject-row { 
            display: flex; flex-wrap: nowrap; gap: 10px; margin-bottom: 12px; 
            background: rgba(0,0,0,0.03); padding: 10px; border-radius: 20px; 
            border: 1px solid var(--border-color); align-items: flex-start; 
            animation: slideDown 0.3s ease-out;
        }
        .subject-name { flex: 2; min-width: 0; }
        .subject-input-group { flex: 1.5; min-width: 140px; display: flex; flex-direction: column; } 
        
        .btn-delete { 
            flex: 0 0 auto; width: 45px; height: 45px; 
            background-color: var(--danger-color); color: white; 
            padding: 0; font-size: 0.9rem; 
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .btn-delete::after { content: '✕'; font-weight: bold; } 
        .btn-add-subject { background-color: var(--success-color); color: white; margin-top: 15px; }

        @media (max-width: 400px) {
            .subject-row { flex-wrap: wrap; }
            .subject-name { flex: 1 1 100%; }
            .subject-input-group { flex: 1 1 auto; }
        }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card-bg); padding: 15px 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1); z-index: 100;
            display: flex; gap: 15px; border-top: 1px solid var(--border-color);
            justify-content: center;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
        }
        .bottom-bar button { max-width: 400px; }
        .btn-calculate { background-color: var(--dark-blue); color: #fff; flex: 2; }
        body.dark-mode .btn-calculate { color: #121212; font-weight: 800; }
        .btn-reset { background-color: transparent; color: var(--danger-color); border: 1px solid var(--danger-color); flex: 1; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--modal-bg); z-index: 2000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s ease;
            backdrop-filter: blur(3px); cursor: pointer;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .message-card, .result-card {
            cursor: default; background: var(--card-bg); width: 90%; max-width: 450px;
            padding: 30px; border-radius: 30px; text-align: center;
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }
        
        .result-card { transform: translateY(20px); transition: transform 0.3s ease; }
        .modal-overlay.active .message-card { transform: scale(1); }
        .modal-overlay.active .result-card { transform: translateY(0); }

        /* SVG Circle Progress */
        .gpa-circle-container {
            position: relative;
            width: 200px; height: 200px;
            margin: 0 auto 15px auto;
        }
        
        .progress-ring__circle-bg {
            stroke: var(--circle-bg);
            transition: stroke 0.3s;
        }
        
        .progress-ring__circle {
            stroke: var(--dynamic-color); /* اللون الديناميكي */
            transition: stroke-dashoffset 1s ease-in-out, stroke 0.5s ease;
        }

        .gpa-content {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .gpa-number { font-size: 3.8rem; font-weight: bold; line-height: 1; color: var(--dynamic-color); transition: color 0.5s ease; }
        .gpa-label { font-size: 1rem; opacity: 0.9; margin-top: 5px; color: var(--text-color); }
        
        .motivational-text {
            color: var(--dynamic-color); /* النص بنفس لون التقدير */
            font-size: 1.3rem; font-weight: 800; margin-bottom: 25px; min-height: 30px;
            animation: fadeIn 0.5s ease-in; line-height: 1.4;
            transition: color 0.5s ease;
        }

        .result-details { width: 100%; margin-bottom: 35px; }
        .detail-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border-color); font-size: 1.1rem; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: #888; font-size: 1rem; }
        .detail-value { font-weight: bold; color: var(--text-color); }

        .btn-share {
            background-color: var(--success-color); color: white; margin-bottom: 10px; 
        }
        
        .msg-icon { font-size: 3.5rem; margin-bottom: 15px; display: block; }
        .msg-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; color: var(--text-color); }
        .msg-desc { color: #888; margin-bottom: 25px; font-size: 1rem; line-height: 1.6; }
        .msg-actions { display: flex; gap: 15px; justify-content: center; }
        .btn-ok { background-color: var(--primary-color); color: white; flex: 1; }
        .btn-danger-confirm { background-color: var(--danger-color); color: white; flex: 1; }
        .btn-cancel { background-color: #eee; color: #333; flex: 1; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="header-section">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙</button>
    <h1>حاسبة الـ GPA</h1>
    <div class="subtitle">كلية الحاسبات والمعلومات – جامعة المنوفية</div>
    <div class="separator"></div>
</div>

<div class="container">
    <div id="terms-container"></div>
    <button class="btn-add-term" onclick="addTerm()">+ إضافة ترم جديد</button>
</div>

<div class="bottom-bar">
    <button class="btn-reset" onclick="confirmResetAction()">مسح الكل</button>
    <button class="btn-calculate" onclick="calculateOverallGPA()">أحسب النتيجة</button>
</div>

<div id="result-modal" class="modal-overlay" onclick="closeModalOutside(event, 'result-modal')">
    <div class="result-card" id="capture-area">
        
        <div class="gpa-circle-container">
            <svg class="progress-ring" width="200" height="200">
                <circle class="progress-ring__circle-bg" stroke-width="8" fill="transparent" r="90" cx="100" cy="100" transform="rotate(-90 100 100)"/>
                <circle id="progress-circle" class="progress-ring__circle" stroke-width="8" fill="transparent" r="90" cx="100" cy="100"
                        stroke-dasharray="565.5" stroke-dashoffset="565.5" stroke-linecap="round" transform="rotate(-90 100 100)"/>
            </svg>
            <div class="gpa-content">
                <span class="gpa-number" id="final-gpa">0.00</span>
                <span class="gpa-label">المعدل التراكمي</span>
            </div>
        </div>
        
        <div id="motivational-quote" class="motivational-text"></div>

        <div class="result-details">
            <div class="detail-row">
                <span class="detail-label">التقدير العام</span>
                <span class="detail-value" id="final-grade">-</span>
            </div>
        </div>
        <button class="btn-share" onclick="shareResult()">📸 تحميل النتيجة كصورة</button>
        <button class="btn-calculate" onclick="closeModal('result-modal')">رجوع للتعديل</button>
    </div>
</div>

<div id="general-modal" class="modal-overlay" onclick="closeModalOutside(event, 'general-modal')">
    <div class="message-card">
        <span class="msg-icon" id="msg-icon">⚠️</span>
        <div class="msg-title" id="msg-title">عنوان</div>
        <div class="msg-desc" id="msg-desc">نص الرسالة</div>
        <div class="msg-actions" id="msg-actions"></div>
    </div>
</div>

<script>
    let termCounter = 0;
    let termIdToDelete = null;

    const gradePoints = {
        'A+': 4.0, 'A': 3.7, 'B+': 3.3, 'B': 3.0,
        'C+': 2.7, 'C': 2.4, 'D+': 2.2, 'D': 2.0, 'F': 0.0
    };

    const motivationalPhrases = [
        "عاش يا وحش!", "الله عليك يا فنان", "ايه العظمة دي!", "يا جامد", "استمر يا بطل",
        "اللهم بارك", "ما شاء الله عليك", "ايوة كدة فرحنا", "مجهود جبار", "الله ينور عليك",
        "تسلم دماغك", "برنس والله", "عالمي يا ابني", "ملك الـ GPA", "هو ده الكلام",
        "فخر العرب", "عبقري والله", "دماغ ألماظ", "عاش مجهودك", "ربنا يحميك",
        "عظمة على عظمة", "أسطورة", "يا ولا يا ولا", "دحيح الدفعة", "ما هذا الجمال",
        "الله أكبر عليك", "شرفت أهلك", "مستقبل باهر ان شاء الله", "التقدير ده مش ببلاش", "تعبت ولقيت"
    ];

    function toggleTheme() {
        const body = document.body;
        body.classList.toggle('dark-mode');
        const btn = document.getElementById('theme-btn');
        
        if (body.classList.contains('dark-mode')) {
            btn.innerText = '☀️';
            localStorage.setItem('theme', 'dark');
        } else {
            btn.innerText = '🌙';
            localStorage.setItem('theme', 'light');
        }
    }

    function saveData() {
        const termsData = [];
        const terms = document.querySelectorAll('.term-card');
        
        terms.forEach(term => {
            const termId = term.id;
            const termObj = {
                name: term.querySelector('.term-header input').value,
                mode: document.querySelector(`input[name="mode-${termId}"]:checked`).value,
                directGpa: term.querySelector('.term-gpa-input').value,
                isExpanded: term.classList.contains('expanded'), // حفظ حالة الفتح/الإغلاق
                subjects: []
            };

            const subjects = term.querySelectorAll('.subject-row');
            subjects.forEach(sub => {
                const subObj = {
                    name: sub.querySelector('.subject-name').value,
                    letterGrade: sub.querySelector('.grade-input') ? sub.querySelector('.grade-input').value : '',
                    percentGrade: sub.querySelector('.percent-input') ? sub.querySelector('.percent-input').value : ''
                };
                termObj.subjects.push(subObj);
            });
            termsData.push(termObj);
        });

        localStorage.setItem('gpaData', JSON.stringify(termsData));
    }

    function loadData() {
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            document.getElementById('theme-btn').innerText = '☀️';
        }

        const saved = localStorage.getItem('gpaData');
        if (saved) {
            const termsData = JSON.parse(saved);
            const container = document.getElementById('terms-container');
            container.innerHTML = '';
            termCounter = 0;

            if (termsData.length === 0) { addTerm(); return; }

            termsData.forEach(tData => {
                // نضيف الترم ونجعله مفتوحاً افتراضياً عند التحميل إذا كان مفتوحاً وقت الحفظ
                // أو يمكننا جعله مغلقاً لتوفير المساحة
                addTerm(false, tData.isExpanded !== false); 
                
                const currentId = `term-${termCounter}`;
                const termDiv = document.getElementById(currentId);

                termDiv.querySelector('.term-header input').value = tData.name;
                
                const radios = document.getElementsByName(`mode-${currentId}`);
                radios.forEach(r => { if (r.value === tData.mode) r.checked = true; });
                updateTermView(currentId);

                if (tData.mode === 'term-gpa') {
                    termDiv.querySelector('.term-gpa-input').value = tData.directGpa;
                } else {
                    const list = document.getElementById(`${currentId}-list`);
                    list.innerHTML = ''; 
                    tData.subjects.forEach(sub => {
                        addSubject(currentId, false);
                        const rows = list.querySelectorAll('.subject-row');
                        const lastRow = rows[rows.length - 1];
                        
                        lastRow.querySelector('.subject-name').value = sub.name;
                        if (tData.mode === 'subjects-letter') {
                             if(sub.letterGrade) lastRow.querySelector('.grade-input').value = sub.letterGrade;
                        } else {
                             if(sub.percentGrade) lastRow.querySelector('.percent-input').value = sub.percentGrade;
                        }
                    });
                }
            });
        } else {
            addTerm();
        }
    }

    document.addEventListener('input', saveData);
    document.addEventListener('change', saveData);

    // --- Accordion Logic ---
    function toggleTerm(termId) {
        const termCard = document.getElementById(termId);
        termCard.classList.toggle('expanded');
        saveData(); // حفظ الحالة
    }

    function clearError(input) {
        input.classList.remove('input-error');
        const parent = input.parentElement;
        const errorMsg = parent.querySelector('.error-feedback');
        if (errorMsg) errorMsg.classList.remove('visible');
    }

    function validateInput(input, min, max) {
        const valStr = input.value;
        const parent = input.parentElement;
        let errorMsg = parent.querySelector('.error-feedback');
        if (!errorMsg) {
            errorMsg = document.createElement('div');
            errorMsg.className = 'error-feedback';
            parent.appendChild(errorMsg);
        }

        if (valStr.trim() === "") {
            input.classList.add('input-error');
            errorMsg.innerText = "هذا الحقل مطلوب";
            errorMsg.classList.add('visible');
            return false;
        }

        if (min !== undefined && max !== undefined) {
            const val = parseFloat(valStr);
            if (val < min || val > max) {
                input.classList.add('input-error');
                errorMsg.innerText = `بين ${min} و ${max}`;
                errorMsg.classList.add('visible');
                return false;
            }
        }

        clearError(input);
        return true;
    }

    function addTerm(shouldSave = true, isExpanded = true) {
        termCounter++;
        const container = document.getElementById('terms-container');
        const termId = `term-${termCounter}`;
        const termDiv = document.createElement('div');
        // إضافة كلاس expanded افتراضياً لتسهيل الإدخال
        termDiv.className = `term-card ${isExpanded ? 'expanded' : ''}`;
        termDiv.id = termId;

        termDiv.innerHTML = `
            <div class="term-header" onclick="toggleTerm('${termId}')">
                <span class="arrow-icon">▼</span>
                <input type="text" value="ترم ${termCounter}" onclick="event.stopPropagation(); this.select()">
                <div class="term-result-badge" id="${termId}-badge">GPA: 0.00</div>
                <button class="btn-delete-term" onclick="event.stopPropagation(); confirmDeleteTerm('${termId}')">✕</button>
            </div>
            
            <div class="term-body">
                <div class="radio-group">
                    <div class="radio-title">طريقة حساب الترم:</div>
                    <div class="radio-options-row">
                        <label class="radio-option">
                            <input type="radio" name="mode-${termId}" value="term-gpa" onchange="updateTermView('${termId}')" checked> المعدل الفصلي
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="mode-${termId}" value="subjects-letter" onchange="updateTermView('${termId}')"> المواد (تقدير)
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="mode-${termId}" value="subjects-percent" onchange="updateTermView('${termId}')"> المواد (درجة)
                        </label>
                    </div>
                </div>
                <div id="${termId}-direct" class="input-section">
                    <label style="display:block; margin-bottom:5px;">المعدل الفصلي (GPA):</label>
                    <input type="number" step="0.01" class="term-gpa-input" placeholder="مثلاً: 3.5" oninput="clearError(this)">
                </div>
                <div id="${termId}-subjects" class="input-section hidden">
                    <div class="subjects-list" id="${termId}-list"></div>
                    <button class="btn-add-subject" onclick="addSubject('${termId}')">+ إضافة مادة</button>
                </div>
            </div>
        `;
        container.appendChild(termDiv);
        
        if (shouldSave) {
            addSubject(termId); // إضافة مادة افتراضية عند الإنشاء اليدوي
            saveData();
        }
    }

    function updateTermView(termId) {
        const mode = document.querySelector(`input[name="mode-${termId}"]:checked`).value;
        const directDiv = document.getElementById(`${termId}-direct`);
        const subjectsDiv = document.getElementById(`${termId}-subjects`);
        const listContainer = document.getElementById(`${termId}-list`);
        document.getElementById(`${termId}-badge`).classList.remove('visible');

        const allInputs = document.getElementById(termId).querySelectorAll('input, select');
        allInputs.forEach(inp => clearError(inp));

        if (mode === 'term-gpa') {
            directDiv.classList.remove('hidden'); subjectsDiv.classList.add('hidden');
        } else {
            directDiv.classList.add('hidden'); subjectsDiv.classList.remove('hidden');
            const rows = listContainer.querySelectorAll('.subject-row');
            rows.forEach(row => {
                const inputGroup = row.querySelector('.subject-input-group');
                inputGroup.innerHTML = getSubjectInputHTML(mode);
            });
        }
    }

    function getSubjectInputHTML(mode) {
        if (mode === 'subjects-letter') {
            return `<select class="grade-input" onchange="clearError(this)">
                    <option value="" disabled selected>التقدير</option>
                    <option value="A+">A+ / أ+</option>
                    <option value="A">A / أ</option>
                    <option value="B+">B+ / ب+</option>
                    <option value="B">B / ب</option>
                    <option value="C+">C+ / ج+</option>
                    <option value="C">C / ج</option>
                    <option value="D+">D+ / د+</option>
                    <option value="D">D / د</option>
                    <option value="F">F / ر / رن / رل</option>
                    </select>`;
        } else {
            return `<input type="number" class="percent-input" placeholder="الدرجة" min="0" max="100" oninput="clearError(this)">`;
        }
    }

    function addSubject(termId, shouldSave = true) {
        const listContainer = document.getElementById(`${termId}-list`);
        const checkedRadio = document.querySelector(`input[name="mode-${termId}"]:checked`);
        let mode = (checkedRadio && checkedRadio.value !== 'term-gpa') ? checkedRadio.value : 'subjects-letter';
        
        // الرقم التسلسلي للمادة
        const currentCount = listContainer.querySelectorAll('.subject-row').length + 1;
        
        const row = document.createElement('div');
        row.className = 'subject-row';
        // إضافة القيمة الافتراضية "مادة X"
        row.innerHTML = `<input type="text" class="subject-name" placeholder="اسم المادة" value="مادة ${currentCount}">
            <div class="subject-input-group">${getSubjectInputHTML(mode)}</div>
            <button class="btn-delete" onclick="removeSubject(this)"></button>`;
        listContainer.appendChild(row);
        
        if(shouldSave) saveData();
    }
    
    function removeSubject(btn) {
        btn.parentElement.remove();
        saveData();
    }

    function convertPercentToPoints(percent) {
        if (percent >= 90) return 4.0; if (percent >= 85) return 3.7;
        if (percent >= 80) return 3.3; if (percent >= 75) return 3.0;
        if (percent >= 70) return 2.7; if (percent >= 65) return 2.4;
        if (percent >= 60) return 2.2; if (percent >= 50) return 2.0;
        return 0.0;
    }

    function calculateOverallGPA() {
        const terms = document.querySelectorAll('.term-card');
        let sumOfGPAs = 0; let termsCount = 0;
        let hasError = false;

        for (let i = 0; i < terms.length; i++) {
            const term = terms[i];
            const termId = term.id;
            const mode = document.querySelector(`input[name="mode-${termId}"]:checked`).value;
            const badge = document.getElementById(`${termId}-badge`);
            let currentTermGPA = 0; let isValidTerm = false;

            if (mode === 'term-gpa') {
                const gpaInput = term.querySelector('.term-gpa-input');
                if (validateInput(gpaInput, 0, 4)) {
                    currentTermGPA = parseFloat(gpaInput.value); isValidTerm = true;
                } else { hasError = true; }
            } else {
                const rows = term.querySelectorAll(`#${termId}-list .subject-row`);
                let totalSubjectPoints = 0; let subjectsCount = 0;
                rows.forEach(row => {
                    let points = 0; let hasValue = false;
                    if (mode === 'subjects-letter') {
                        const gradeSelect = row.querySelector('.grade-input');
                        if (validateInput(gradeSelect)) { 
                             points = gradePoints[gradeSelect.value]; hasValue = true;
                        } else { hasError = true; }
                    } else {
                        const percentInput = row.querySelector('.percent-input');
                        if (validateInput(percentInput, 0, 100)) { 
                            points = convertPercentToPoints(parseFloat(percentInput.value)); hasValue = true;
                        } else { hasError = true; }
                    }
                    if (hasValue) { totalSubjectPoints += points; subjectsCount++; }
                });
                if (subjectsCount > 0 && !hasError) { 
                    currentTermGPA = totalSubjectPoints / subjectsCount; isValidTerm = true; 
                }
            }

            if (isValidTerm) {
                sumOfGPAs += currentTermGPA; termsCount++;
                badge.innerText = `GPA: ${currentTermGPA.toFixed(2)}`; badge.classList.add('visible');
            } else { badge.classList.remove('visible'); }
        }

        if (hasError) {
             showAlert("تنبيه", "توجد حقول ناقصة أو خاطئة (باللون الأحمر).", "⚠️");
        } else if (termsCount > 0) {
            const finalGPA = sumOfGPAs / termsCount;
            document.getElementById('final-gpa').innerText = finalGPA.toFixed(2);
            document.getElementById('final-grade').innerText = getGradeText(finalGPA);
            
            // --- حساب اللون الديناميكي ---
            let dynamicColor = getComputedStyle(document.documentElement).getPropertyValue('--danger-color').trim();
            if (finalGPA >= 3.0) {
                dynamicColor = getComputedStyle(document.documentElement).getPropertyValue('--success-color').trim();
            } else if (finalGPA >= 2.0) {
                dynamicColor = getComputedStyle(document.documentElement).getPropertyValue('--warning-color').trim();
            }
            
            // تطبيق اللون على المتغير الجذري ليراه الـ CSS
            document.documentElement.style.setProperty('--dynamic-color', dynamicColor);

            // تحديث دائرة SVG
            const circle = document.getElementById('progress-circle');
            const radius = circle.r.baseVal.value;
            const circumference = 2 * Math.PI * radius;
            const progress = finalGPA / 4.0;
            const offset = circumference - (progress * circumference);
            
            circle.style.strokeDashoffset = offset;

            const motivationDiv = document.getElementById('motivational-quote');
            if (finalGPA >= 2.5) {
                const randomPhrase = motivationalPhrases[Math.floor(Math.random() * motivationalPhrases.length)];
                motivationDiv.innerText = randomPhrase;
                motivationDiv.style.display = 'block';
            } else {
                motivationDiv.style.display = 'none';
            }

            document.getElementById('result-modal').classList.add('active');
            if (finalGPA >= 3.0) triggerConfetti();
        } else {
            showAlert("تنبيه", "الرجاء إدخال بيانات صحيحة في ترم واحد على الأقل للمتابعة.", "⚠️");
        }
    }

    async function shareResult() {
        const card = document.getElementById('capture-area');
        
        try {
            // جلب اللون الديناميكي الحالي لاستخدامه في الصورة
            const currentColor = getComputedStyle(document.documentElement).getPropertyValue('--dynamic-color').trim();

            const canvas = await html2canvas(card, {
                backgroundColor: '#1e1e1e', 
                scale: 3,
                logging: false,
                useCORS: true,
                onclone: (clonedDoc) => {
                    clonedDoc.body.classList.add('dark-mode');

                    const clonedCard = clonedDoc.getElementById('capture-area');
                    const clonedBtns = clonedCard.querySelectorAll('button');
                    clonedBtns.forEach(b => b.style.display = 'none');

                    if (clonedCard) {
                        clonedCard.style.backgroundColor = '#1e1e1e';
                        clonedCard.style.color = '#e0e0e0';
                        clonedCard.style.boxShadow = 'none';
                    }

                    const clonedText = clonedDoc.getElementById('motivational-quote');
                    if(clonedText) {
                        clonedText.style.animation = 'none';
                        clonedText.style.opacity = '1';
                        // إجبار اللون الديناميكي في الصورة
                        clonedText.style.color = currentColor;
                    }

                    const progressCircle = clonedDoc.getElementById('progress-circle');
                    if (progressCircle) {
                        progressCircle.style.stroke = currentColor;
                    }
                    
                    const gpaNum = clonedDoc.querySelector('.gpa-number');
                    if (gpaNum) gpaNum.style.color = currentColor;

                    // Fix SVG Circle Background
                    const svgBg = clonedDoc.querySelector('.progress-ring__circle-bg');
                    if(svgBg) svgBg.style.stroke = '#333333'; 
                    
                    const gpaLbl = clonedDoc.querySelector('.gpa-label');
                    if(gpaLbl) gpaLbl.style.color = '#e0e0e0';
                }
            });
            
            const link = document.createElement('a');
            link.download = 'GPA-Result.png';
            link.href = canvas.toDataURL();
            link.click();
            
        } catch (err) {
            console.error(err);
            alert('حدث خطأ أثناء حفظ الصورة');
        }
    }

    function showAlert(title, message, icon) {
        document.getElementById('msg-icon').innerText = icon || "ℹ️";
        document.getElementById('msg-title').innerText = title;
        document.getElementById('msg-desc').innerText = message;
        const actionsDiv = document.getElementById('msg-actions');
        actionsDiv.innerHTML = `<button class="btn-ok" onclick="closeModal('general-modal')">حسناً</button>`;
        document.getElementById('general-modal').classList.add('active');
    }

    function confirmDeleteTerm(termId) {
        termIdToDelete = termId;
        document.getElementById('msg-icon').innerText = "🗑️";
        document.getElementById('msg-title').innerText = "حذف الترم؟";
        document.getElementById('msg-desc').innerText = "سيتم حذف هذا الترم بجميع بياناته.";
        const actionsDiv = document.getElementById('msg-actions');
        actionsDiv.innerHTML = `
            <button class="btn-cancel" onclick="closeModal('general-modal')">إلغاء</button>
            <button class="btn-danger-confirm" onclick="executeDeleteTerm()">حذف</button>
        `;
        document.getElementById('general-modal').classList.add('active');
    }

    function executeDeleteTerm() {
        if (termIdToDelete) {
            const termElement = document.getElementById(termIdToDelete);
            if (termElement) termElement.remove();
            termIdToDelete = null;
            saveData();
        }
        closeModal('general-modal');
    }

    function confirmResetAction() {
        document.getElementById('msg-icon').innerText = "⚠️";
        document.getElementById('msg-title').innerText = "مسح الكل؟";
        document.getElementById('msg-desc').innerText = "سيتم حذف جميع الترمات نهائياً.";
        const actionsDiv = document.getElementById('msg-actions');
        actionsDiv.innerHTML = `
            <button class="btn-cancel" onclick="closeModal('general-modal')">إلغاء</button>
            <button class="btn-danger-confirm" onclick="executeReset()">مسح</button>
        `;
        document.getElementById('general-modal').classList.add('active');
    }

    function executeReset() {
        const container = document.getElementById('terms-container');
        container.innerHTML = ''; termCounter = 0; addTerm();
        localStorage.removeItem('gpaData'); 
        window.scrollTo({ top: 0, behavior: 'smooth' });
        closeModal('general-modal');
    }

    function closeModal(modalId) {
        document.getElementById(modalId).classList.remove('active');
    }
    
    function closeModalOutside(event, modalId) {
        if (event.target.id === modalId) closeModal(modalId);
    }

    function getGradeText(gpa) {
        if (gpa >= 3.5) return "ممتاز"; if (gpa >= 3.0) return "جيد جداً";
        if (gpa >= 2.5) return "جيد"; if (gpa >= 2.0) return "مقبول";
        if (gpa >= 1.5) return "ضعيف"; return "ضعيف جداً";
    }

    function triggerConfetti() {
        var duration = 3000; var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 3000 };
        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random()*0.2 + 0.1, y: Math.random()-0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random()*0.2 + 0.7, y: Math.random()-0.2 } }));
        }, 250);
    }

    window.onload = loadData;

</script>
